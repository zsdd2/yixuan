services:
  db:
    image: postgres:15-alpine
    container_name: photo_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: photo_web
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    ports:
      - "8000:8000"
    volumes:
      # 挂载应用代码，支持热重载
      - ./app:/app
      # 模拟 NAS 文件系统挂载
      - ./nas_mock_data:/mnt/nas_data
      # 缩略图持久化存储（scan-nas 生成的 WebP 缩略图写入此卷）
      - ./app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    command: sh /app/entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
